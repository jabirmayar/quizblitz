<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Portal</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#050505">
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (!token) return;

            const parseJwt = (jwtToken) => {
                try {
                    const parts = jwtToken.split('.');
                    if (parts.length !== 3) return null;
                    const base64Url = parts[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
                    const json = atob(padded);
                    return JSON.parse(json);
                } catch (_) {
                    return null;
                }
            };

            const payload = parseJwt(token);
            if (!payload) return;

            const exp = payload.exp;
            const expSeconds = (typeof exp === 'number') ? exp : (typeof exp === 'string' ? Number(exp) : null);
            if (expSeconds && Date.now() >= expSeconds * 1000) {
                localStorage.removeItem('token');
                localStorage.removeItem('role');
                localStorage.removeItem('displayName');
                return;
            }

            const r = payload.role;
            if (r === 'admin') window.location.href = '/admin/dashboard';
            else if (r === 'teacher') window.location.href = '/teacher/dashboard';
            else if (r === 'student') window.location.href = '/dashboard';
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#050505]">
    <div id="app" v-cloak class="w-full max-w-[500px]">
        <div class="glass-card p-10 rounded-2xl">
            <header class="mb-8 text-center">
                <h1 class="brand-title text-xl uppercase tracking-tighter mb-1">{{ config.APP_NAME }}</h1>
                <h2 class="text-sm font-medium text-zinc-500 uppercase tracking-widest">Student Enrollment</h2>
            </header>

            <form @submit.prevent="handleRegister" class="space-y-4">
                <input v-model="form.display_name" type="text" placeholder="Full Name" class="input-field text-sm" required :disabled="loading">
                <input v-model="form.registration_id" type="text" minlength="8" placeholder="Registration ID (AWKUM-123456789)" class="input-field text-sm font-mono" required :disabled="loading">

                <!-- Honeypot field (spam bots often fill this). Must stay empty. -->
                <div style="position:absolute; left:-10000px; top:auto; width:1px; height:1px; overflow:hidden;">
                    <label>Website</label>
                    <input v-model="form.website" type="text" tabindex="-1" autocomplete="off">
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <!-- Step 1: Dept -->
                    <div>
                        <label class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest mb-1 block ml-1">1. Department</label>
                        <select v-model="form.deptId" @change="onDeptChange" class="input-field text-xs cursor-pointer" required :disabled="loading">
                            <option :value="null">Select Department</option>
                            <option v-for="d in depts" :key="d.id" :value="d.id">{{ d.name }}</option>
                        </select>
                    </div>

                    <!-- Step 2: Program (Depends on Dept) -->
                    <div v-if="form.deptId">
                        <label class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest mb-1 block ml-1">2. Degree Program</label>
                        <select v-model="form.progId" @change="onProgramChange" class="input-field text-xs cursor-pointer" required :disabled="loading">
                            <option :value="null">Select Program</option>
                            <option v-for="p in progs" :key="p.id" :value="p.id">{{ p.name }}</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3" v-if="form.progId">
                        <!-- Step 3: Session (Depends on Program/Dept) -->
                        <div>
                            <label class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest mb-1 block ml-1">3. Session</label>
                            <select v-model="form.semId" @change="onSessionChange" class="input-field text-xs cursor-pointer" required :disabled="loading">
                                <option :value="null">Select Session</option>
                                <option v-for="s in sems" :key="s.id" :value="s.id">{{ s.season }} {{ s.year }}</option>
                            </select>
                        </div>
                        
                        <!-- Step 4: Class (Depends on Session + Program) -->
                        <div>
                            <label class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest mb-1 block ml-1">4. Class Group</label>
                            <select v-model="form.classId" class="input-field text-xs cursor-pointer disabled:opacity-30" :disabled="!form.semId || loading" required>
                                <option :value="null">Select Class</option>
                                <option v-for="c in classes" :key="c.id" :value="c.id">{{ c.name }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="relative pt-2">
                    <input v-model="form.password" :type="showPassword ? 'text' : 'password'" placeholder="Password" class="input-field text-sm pr-12" required :disabled="loading">
                    <button type="button" @click="showPassword = !showPassword" class="absolute right-4 top-[60%] -translate-y-1/2 text-zinc-600 hover:text-white transition-colors">
                        <svg v-if="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"/></svg>
                        <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" stroke-width="2"/></svg>
                    </button>
                </div>

                <button type="submit" class="btn-primary w-full py-4 text-[11px] mt-4" :disabled="loading">
                    {{ loading ? 'Creating Account...' : 'Complete Registration' }}
                </button>
            </form>

            <div class="mt-8 text-center border-t border-zinc-800 pt-6">
                <p class="text-[11px] text-neutral-600 font-medium">
                    Already have an account? <a href="/index.html" class="text-white font-bold ml-1">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const app = createApp({
            setup() {
                const config = ref(CONFIG);
                const loading = ref(false);
                const showPassword = ref(false);
                const depts = ref([]); const progs = ref([]); const sems = ref([]); const classes = ref([]);
                const form = ref({ display_name: '', registration_id: '', password: '', deptId: null, progId: null, semId: null, classId: null, website: '', form_started_at: Date.now() });

                const fetchDepts = async () => { 
                    depts.value = await api.get('/api/departments') || []; 
                };
                
                const onDeptChange = async () => {
                    form.value.progId = null; form.value.semId = null; form.value.classId = null;
                    sems.value = []; classes.value = [];
                    if (form.value.deptId) {
                        progs.value = await api.get(`/api/departments/${form.value.deptId}/programs`) || [];
                    } else { progs.value = []; }
                };

                const onProgramChange = async () => {
                    form.value.semId = null; form.value.classId = null;
                    classes.value = [];
                    if (form.value.progId) {
                        sems.value = await api.get(`/api/departments/${form.value.deptId}/semesters`) || [];
                    } else { sems.value = []; }
                };

                const onSessionChange = async () => {
                    form.value.classId = null;
                    if (form.value.semId && form.value.progId) {
                        classes.value = await api.get(`/api/semesters/${form.value.semId}/classes?program_id=${form.value.progId}`) || [];
                    } else { classes.value = []; }
                };

                const handleRegister = async () => {
                    if (!form.value.classId) { alert("Please select your class group"); return; }
                    loading.value = true;
                    try {
                        await api.post('/api/auth/register', { 
                            display_name: form.value.display_name,
                            registration_id: form.value.registration_id,
                            password: form.value.password,
                            class_ids: [form.value.classId],
                            website: form.value.website,
                            form_started_at: form.value.form_started_at
                        });

                        const loginRes = await api.post('/api/auth/login', { username: form.value.registration_id, password: form.value.password });
                        localStorage.setItem('token', loginRes.access_token);
                        localStorage.setItem('displayName', loginRes.display_name);
                        window.location.href = '/dashboard';
                    } catch (e) { 
                        alert(e.detail || 'Registration failed. That ID may already be in use.'); 
                        loading.value = false; 
                    }
                };

                onMounted(fetchDepts);
                return { config, loading, depts, progs, sems, classes, showPassword, form, onDeptChange, onProgramChange, onSessionChange, handleRegister };
            }
        }).mount('#app');
    </script>
</body>
</html>
