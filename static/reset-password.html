<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Portal</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#050505">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>Auth.requireAuth({ roles: ['student', 'teacher', 'admin'] });</script>
    <script src="js/api.js"></script>
    <script src="js/navbar.js"></script>
</head>
<body class="antialiased bg-[#050505]">
    <div id="app" v-cloak>
        <navbar></navbar>

        <main class="max-w-xl mx-auto py-16 px-6">
            <header class="mb-10">
                <h2 class="text-3xl font-bold text-white tracking-tight">Reset Password</h2>
                <p class="text-zinc-500 mt-1">Change your password using your current password.</p>
            </header>

            <form @submit.prevent="submit" class="admin-card space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Current Password</label>
                    <input v-model="form.old_password" :type="showOld ? 'text' : 'password'" class="input-field mt-1.5" required :disabled="loading">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">New Password</label>
                    <input v-model="form.new_password" :type="showNew ? 'text' : 'password'" class="input-field mt-1.5" minlength="8" required :disabled="loading">
                    <p class="text-[10px] text-zinc-600 mt-2">Minimum 8 characters.</p>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Confirm New Password</label>
                    <input v-model="confirmNew" :type="showNew ? 'text' : 'password'" class="input-field mt-1.5" minlength="8" required :disabled="loading">
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" class="btn-ghost flex-1 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest" @click="goBack" :disabled="loading">
                        Cancel
                    </button>
                    <button type="submit" class="btn-primary flex-1 py-3 rounded-xl text-[10px]" :disabled="loading">
                        {{ loading ? 'Saving...' : 'Update Password' }}
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script>
        (function () {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = '/';
        })();

        const { createApp, ref } = Vue;
        const app = createApp({
            setup() {
                const loading = ref(false);
                const showOld = ref(false);
                const showNew = ref(false);
                const confirmNew = ref('');
                const form = ref({ old_password: '', new_password: '' });

                const getRoleFromToken = () => {
                    try {
                        const token = localStorage.getItem('token');
                        if (!token) return null;
                        const parts = token.split('.');
                        if (parts.length !== 3) return null;
                        const base64Url = parts[1];
                        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
                        return JSON.parse(atob(padded)).role;
                    } catch (_) {
                        return null;
                    }
                };

                const goBack = () => {
                    const role = getRoleFromToken();
                    if (role === 'admin') window.location.href = '/admin/dashboard';
                    else if (role === 'teacher') window.location.href = '/teacher/dashboard';
                    else window.location.href = '/dashboard';
                };

                const submit = async () => {
                    if (form.value.new_password !== confirmNew.value) {
                        alert('New passwords do not match.');
                        return;
                    }
                    loading.value = true;
                    try {
                        await api.post('/api/auth/change-password', form.value);
                        alert('Password updated successfully.');
                        goBack();
                    } catch (e) {
                        alert(e.detail || 'Password update failed.');
                    } finally {
                        loading.value = false;
                    }
                };

                return { loading, showOld, showNew, confirmNew, form, submit, goBack };
            }
        });

        if (window.NavbarComponent) {
            app.component('Navbar', window.NavbarComponent);
        }

        app.mount('#app');
    </script>
</body>
</html>
